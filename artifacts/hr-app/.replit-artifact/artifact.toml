kind = "web"
previewPath = "/"
title = "Teston HR System"
version = "1.0.0"
id = "artifacts/hr-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25180

[services.development]
run = "pnpm --filter @workspace/hr-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-app", "run", "build" ]
publicDir = "artifacts/hr-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25180"
BASE_PATH = "/"
