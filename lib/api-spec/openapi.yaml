  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /anomalies:
    get:
      operationId: listAnomalies
      tags: [anomalies]
      summary: Detect anomalies
      description: |
        Runs the anomaly detection engine across attendance, leave, and productivity data
        for the specified month (or the current month by default). Returns flagged items
        sorted by severity (critical first).
      parameters:
        - in: query
          name: month
          schema:
            type: string
          description: "Month to analyze, format YYYY-MM (e.g. 2026-03). Defaults to current month."
        - in: query
          name: severity
          schema:
            type: string
            enum: [critical, warning, info]
          description: Filter results by severity level.
      responses:
        "200":
          description: Anomalies detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin, hr, or manager role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workers/me/face-descriptor:
    get:
      operationId: getMyFaceDescriptor
      tags: [workers]
      summary: Get the logged-in worker's registered face descriptor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Face descriptor (own worker profile only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceDescriptorResponse"
        "404":
          description: Worker profile not found

  /workers/{workerId}/face:
    post:
      operationId: registerFace
      tags: [workers]
      summary: Register face descriptor for a worker (admin/hr)
      parameters:
        - in: path
          name: workerId
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterFaceRequest"
      responses:
        "200":
          description: Face registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerResponse"
    delete:
      operationId: deleteFace
      tags: [workers]
      summary: Delete face descriptor for a worker (admin/hr)
      parameters:
        - in: path
          name: workerId
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Face deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerResponse"

  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List all roles
      responses:
        "200":
          description: Roles list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResponse"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create a role (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"

  /roles/{id}:
    get:
      operationId: getRole
      tags: [roles]
      summary: Get a role by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"

  /workers:
    get:
      operationId: listWorkers
      tags: [workers]
      summary: List workers
      parameters:
        - in: query
          name: departmentId
          schema:
            type: number
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: Workers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerListResponse"
    post:
      operationId: createWorker
      tags: [workers]
      summary: Create a worker record (admin/hr only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerResponse"

  /workers/{id}:
    get:
      operationId: getWorker
      tags: [workers]
      summary: Get worker by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerResponse"
    patch:
      operationId: updateWorker
      tags: [workers]
      summary: Update worker record (admin/hr only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
