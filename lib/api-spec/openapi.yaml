      responses:
        "200":
          description: Attendance exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceExceptionResponse"
        "404":
          description: Not found
    patch:
      operationId: updateAttendanceException
      tags: [attendance-exceptions]
      summary: Update attendance exception (review/submit)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendanceExceptionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceExceptionResponse"

  /face-verification-attempts:
    get:
      operationId: listFaceVerificationAttempts
      tags: [face-verification-attempts]
      summary: List face verification attempts
      parameters:
        - in: query
          name: userId
          schema:
            type: number
        - in: query
          name: outcome
          schema:
            type: string
        - in: query
          name: attemptType
          schema:
            type: string
      responses:
        "200":
          description: Face verification attempts
          content:
            application/json:
              schema:
